<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Regedit VIP - HIẾU LIVE</title>
    <style>
        :root { 
            --primary: #ff4a4a; 
            --bg: #0d0f12; 
            --card-bg: #161920; 
            --text: #ffffff; 
            --text-dim: #a0a5b5; 
            --accent: #00e676; 
            --neon-blue: #00f0ff;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 25px; 
            box-shadow: 0 0 30px rgba(255, 74, 74, 0.15); 
            box-sizing: border-box; 
            border: 1px solid rgba(255, 74, 74, 0.2);
        }
        
        h2 { 
            text-align: center; 
            color: var(--primary); 
            margin: 0; 
            text-transform: uppercase; 
            font-size: 24px; 
            letter-spacing: 2px; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.6);
            animation: pulseGlow 2s infinite alternate;
        }
        
        @keyframes pulseGlow {
            from { text-shadow: 0 0 8px rgba(255, 74, 74, 0.5); }
            to { text-shadow: 0 0 18px rgba(255, 74, 74, 0.9), 0 0 25px rgba(255, 74, 74, 0.4); }
        }
        
        .sub-title { 
            text-align: center; 
            color: #ffc107; 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            text-shadow: 0 0 5px rgba(255, 193, 7, 0.5);
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-dim); font-size: 14px; font-weight: 500; }
        
        input[type="text"] { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #2e3440; 
            background: #1f2330; 
            color: white; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        input[type="text"]:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.4);
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #ff4a4a, #c71515); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(255, 74, 74, 0.4);
            transition: all 0.2s ease;
        }
        
        button:active { transform: scale(0.97); box-shadow: 0 2px 5px rgba(255, 74, 74, 0.2); }
        
        .app-section { display: none !important; }
        .active-section { display: block !important; }
        
        .info-box { 
            background: #1d212c; 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 18px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Hiệu ứng viền LED RGB chạy quanh hộp độ nhạy */
        .neon-border {
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }
        
        .info-title { 
            font-weight: 800; 
            color: var(--primary); 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            font-size: 14px; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Cấu trúc item độ nhạy kèm thanh tiến trình */
        .stat-item { 
            background: #141720; 
            padding: 12px; 
            border-radius: 12px; 
            position: relative;
            border-left: 3px solid var(--primary);
        }
        .stat-item.cyan-tag { border-left-color: var(--neon-blue); }
        
        .stat-item span { 
            display: block; 
            color: var(--text-dim); 
            font-size: 11px; 
            margin-bottom: 6px; 
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .stat-value { font-weight: 900; font-size: 18px; color: #fff; }
        
        /* Thanh Tiến Trình Cảm Ứng (Progress Bar) Đẹp Mắt */
        .progress-bar-bg {
            width: 100%;
            height: 5px;
            background: #252a37;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%; /* Chạy động bằng JS */
            background: linear-gradient(90deg, var(--primary), #ff8f8f);
            border-radius: 3px;
            transition: width 1.2s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        .cyan-tag .progress-bar-fill {
            background: linear-gradient(90deg, var(--neon-blue), #9ffffb);
        }
        
        .btn-install { 
            background: linear-gradient(135deg, #00e676, #00a050); 
            display: block; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            margin-top: 20px; 
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-install:active { transform: scale(0.97); }
        
        .suggestions { margin-top: 12px; font-size: 12px; color: var(--text-dim); }
        .tag { display: inline-block; background: #1f2330; padding: 6px 10px; border-radius: 8px; margin: 4px 4px 0 0; cursor: pointer; border: 1px solid #2e3440; transition: 0.2s; }
        .tag:hover { border-color: var(--primary); color: #fff; background: rgba(255, 74, 74, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2>DPI REGEDIT IPHONE</h2>
    <div class="sub-title">BY HIẾU LIVE</div>
    
    <!-- MÀN HÌNH 1: NHẬP KEY -->
    <div class="app-section active-section" id="keySection">
        <div class="form-group">
            <label>🔑 Nhập Mã Kích Hoạt (Key VIP HIẾU LIVE - Vĩnh Viễn):</label>
            <input type="text" id="activationKey" placeholder="MUA KEY IB CHỦ BOX">
            <button onclick="verifyKey()">XÁC THỰC HỆ THỐNG VIP</button>
        </div>
    </div>

    <!-- MÀN HÌNH 2: NHẬP TÊN THIẾT BỊ -->
    <div class="app-section" id="searchSection">
        <div class="form-group">
            <label>📱 Nhập Tên Dòng Máy iPhone Để Lấy Độ Nhạy:</label>
            <input type="text" id="deviceInput" placeholder="Ví dụ: iPhone 11, iPhone 15 Pro Max..." autocomplete="off">
            <div class="suggestions">
                Gợi ý nhanh: 
                <span class="tag" onclick="selectDevice('iPhone 11')">iPhone 11</span>
                <span class="tag" onclick="selectDevice('iPhone 13 Pro Max')">iPhone 13 Pro Max</span>
                <span class="tag" onclick="selectDevice('iPhone 15 Pro Max')">iPhone 15 Pro Max</span>
            </div>
            <button onclick="getSensitivity()">TRA CỨU ĐỘ NHẠY & CẤU HÌNH</button>
        </div>
    </div>

    <!-- MÀN HÌNH 3: HIỂN THỊ KẾT QUẢ ĐỘ NHẠY ĐÃ BIẾN ĐỔI HIỆU ỨNG ĐẸP MẮT -->
    <div class="app-section" id="resultSection">
        <div class="info-box">
            <div class="info-title">⚡ Thông Tin Thiết Bị VIP</div>
            <div class="grid-2">
                <div class="stat-item"><span>Dòng Máy Kích Hoạt</span><div class="stat-value" id="resModel" style="color: #ffc107;">-</div></div>
                <div class="stat-item" style="border-left-color: var(--accent);"><span>Thời Hạn Sử Dụng</span><div class="stat-value" style="color: var(--accent);">Vĩnh Viễn</div></div>
            </div>
        </div>

        <div class="info-box neon-border">
            <div class="info-title" style="color: var(--neon-blue);">🎯 Độ Nhạy Kéo Tâm HIẾU LIVE (MAX 200)</div>
            <div class="grid-2">
                <div class="stat-item cyan-tag">
                    <span>Nhìn Xung Quanh</span>
                    <div class="stat-value" id="valGeneral">0</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="barGeneral"></div></div>
                </div>
                <div class="stat-item cyan-tag">
                    <span>Red Dot Sight</span>
                    <div class="stat-value" id="valRedDot">0</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="barRedDot"></div></div>
                </div>
                <div class="stat-item">
                    <span>Ống Ngắm 2x</span>
                    <div class="stat-value" id="val2x">0</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="bar2x"></div></div>
                </div>
                <div class="stat-item">
                    <span>Ống Ngắm 4x</span>
                    <div class="stat-value" id="val4x">0</div>
